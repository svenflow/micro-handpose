<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>micro-handpose test</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 20px; background: #111; color: #eee; }
    pre { background: #222; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    img { max-width: 200px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>micro-handpose test</h1>
  <img id="testImg" alt="test hand">
  <pre id="log"></pre>

  <script type="module">
    const logEl = document.getElementById('log');
    function log(msg) {
      logEl.textContent += msg + '\n';
      console.log(msg);
    }

    function stats(times) {
      const s = [...times].sort((a, b) => a - b);
      return {
        median: s[Math.floor(s.length / 2)],
        min: s[0],
        p90: s[Math.floor(s.length * 0.9)],
      };
    }

    async function run() {
      try {
        log('importing micro-handpose...');
        const { createHandpose } = await import('./dist/index.js');

        log('creating detector (loading weights + compiling WebGPU pipeline)...');
        const t0 = performance.now();
        const handpose = await createHandpose({
          weightsUrl: '/weights',
        });
        log(`ready in ${(performance.now() - t0).toFixed(0)}ms`);

        // Load test image onto canvas
        const img = document.getElementById('testImg');
        img.src = '/test_hand.png';
        await new Promise(r => img.onload = r);

        const canvas = new OffscreenCanvas(256, 256);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 256, 256);

        // Warmup
        log('\nwarmup (10 runs)...');
        for (let i = 0; i < 10; i++) await handpose.detect(canvas);

        // === Benchmark 1: Standard detect (end-to-end with readback) ===
        log('\n--- Standard detect (50 runs) ---');
        const times = [];
        let result;
        for (let i = 0; i < 50; i++) {
          const s = performance.now();
          result = await handpose.detect(canvas);
          times.push(performance.now() - s);
        }
        const st = stats(times);
        log(`median: ${st.median.toFixed(2)}ms (${(1000/st.median).toFixed(0)} FPS)`);
        log(`min: ${st.min.toFixed(2)}ms | p90: ${st.p90.toFixed(2)}ms`);

        // === Benchmark 2: Pipelined detect (overlapped readback) ===
        log('\n--- Pipelined detect (50 runs) ---');
        // Prime the pipeline
        await handpose.detectPipelined(canvas);
        const pipeTimes = [];
        for (let i = 0; i < 50; i++) {
          const s = performance.now();
          const r = await handpose.detectPipelined(canvas);
          pipeTimes.push(performance.now() - s);
          if (i === 49) result = r;
        }
        await handpose.flushPipelined();
        const pt = stats(pipeTimes);
        log(`median: ${pt.median.toFixed(2)}ms (${(1000/pt.median).toFixed(0)} FPS)`);
        log(`min: ${pt.min.toFixed(2)}ms | p90: ${pt.p90.toFixed(2)}ms`);

        // === Results ===
        if (result) {
          log(`\nresult:`);
          log(`  score: ${result.score.toFixed(4)}`);
          log(`  handedness: ${result.handedness}`);
          log(`  landmarks (first 5):`);
          for (let i = 0; i < 5; i++) {
            const lm = result.landmarks[i];
            log(`    [${i}] x=${lm.x.toFixed(4)} y=${lm.y.toFixed(4)} z=${lm.z.toFixed(4)}`);
          }
          log(`\n✅ detection successful!`);
        } else {
          log('\n⚠️ no hand detected (below threshold)');
        }

        handpose.dispose();
        log('disposed.');

      } catch (e) {
        log(`\n❌ error: ${e.message}`);
        console.error(e);
      }
    }

    run();
  </script>
</body>
</html>
