<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>micro-handpose test</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 40px auto; padding: 20px; background: #111; color: #eee; }
    pre { background: #222; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 13px; white-space: pre-wrap; }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    img { max-width: 200px; border-radius: 8px; }
    table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    th, td { text-align: left; padding: 6px 12px; border: 1px solid #444; }
    th { background: #333; }
    .fast { color: #4CAF50; font-weight: bold; }
  </style>
</head>
<body>
  <h1>micro-handpose test</h1>
  <img id="testImg" alt="test hand">
  <pre id="log"></pre>

  <script type="module">
    const logEl = document.getElementById('log');
    function log(msg) {
      logEl.textContent += msg + '\n';
      console.log(msg);
    }

    async function run() {
      try {
        log('importing micro-handpose...');
        const { createHandpose } = await import('./dist/index.js');

        log('creating detector...');
        const t0 = performance.now();
        const handpose = await createHandpose({ weightsUrl: '/weights' });
        log(`ready in ${(performance.now() - t0).toFixed(0)}ms`);

        const img = document.getElementById('testImg');
        img.src = '/test_hand.png';
        await new Promise(r => img.onload = r);

        const canvas = new OffscreenCanvas(256, 256);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 256, 256);

        // Correctness check
        const result = await handpose.detect(canvas);
        if (result) {
          log(`\n✅ score=${result.score.toFixed(4)} hand=${result.handedness}`);
        } else {
          log('\n❌ no hand detected!');
          return;
        }

        // Diagnostic benchmark
        log('\n🔬 Running diagnostic benchmark (250 iterations)...');
        log('This tests GPU compute, mapAsync, and pipelining separately.\n');
        const diag = await handpose.benchmarkDiagnostic(canvas, 50);

        log('=== TIMING BREAKDOWN ===');
        log(`GPU only (onSubmittedWorkDone): ${diag.gpuOnly.median.toFixed(1)}ms median, ${diag.gpuOnly.min.toFixed(1)}ms min`);
        log(`mapAsync (with onSubmittedWorkDone): ${diag.mapAsyncOnly.median.toFixed(1)}ms median, ${diag.mapAsyncOnly.min.toFixed(1)}ms min`);
        log(`mapAsync (raw, no wait): ${diag.mapAsyncNoWait.median.toFixed(1)}ms median, ${diag.mapAsyncNoWait.min.toFixed(1)}ms min`);
        log(`Total end-to-end: ${diag.total.median.toFixed(1)}ms median, ${diag.total.min.toFixed(1)}ms min`);
        log(`Pipelined throughput: ${diag.pipelined.median.toFixed(1)}ms median, ${diag.pipelined.min.toFixed(1)}ms min`);

        const readbackOverhead = diag.total.median - diag.gpuOnly.median;
        log(`\nReadback overhead: ~${readbackOverhead.toFixed(1)}ms (total - gpu)`);
        log(`Pipelined saves: ~${(diag.total.median - diag.pipelined.median).toFixed(1)}ms vs standard`);

        handpose.dispose();
        log('\ndone.');

      } catch (e) {
        log(`\n❌ error: ${e.message}`);
        console.error(e);
      }
    }

    run();
  </script>
</body>
</html>
