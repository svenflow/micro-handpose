<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>micro-handpose iPhone diagnostic</title>
<style>
body{background:#000;color:#fff;font-family:monospace;padding:8px;font-size:18px;line-height:1.4;}
.ok{color:#0f0;font-weight:bold;} .fail{color:#f00;font-weight:bold;} .warn{color:#ff0;}
h2{font-size:22px;margin:12px 0 4px;border-bottom:1px solid #555;}
</style>
</head><body>
<div id="log"></div>
<script type="module">
const log = document.getElementById('log');
function L(msg, cls) {
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  log.appendChild(d);
  window.scrollTo(0, document.body.scrollHeight);
}

try {
  L('IPHONE DIAG v3');
  if (!navigator.gpu) { L('NO WEBGPU', 'fail'); throw new Error('x'); }

  const adapter = await navigator.gpu.requestAdapter();
  const hasDEF = adapter.features.has('shader-f16');
  L('f16=' + hasDEF + ' maxWG=' + adapter.limits.maxComputeInvocationsPerWorkgroup);

  const { createHandpose } = await import('./dist/index.js?v=' + Date.now());

  // Load hand image
  const img = new Image();
  img.crossOrigin = 'anonymous';
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = () => reject(new Error('img fail'));
    img.src = './hand_test.jpg?v=' + Date.now();
  });
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const sz = Math.min(img.width, img.height);
  ctx.drawImage(img, (img.width-sz)/2, (img.height-sz)/2, sz, sz, 0, 0, 256, 256);
  L('IMG OK ' + img.width + 'x' + img.height);

  // TEST 1: Default path (should auto-fallback to f32 on iOS)
  L('--- DEFAULT TEST ---', 'warn');
  const hp16 = await createHandpose({ weightsUrl: './weights/', scoreThreshold: 0 });
  const r16 = await hp16.detect(canvas);
  if (!r16) {
    L('DEF: NULL RESULT', 'fail');
  } else {
    const allZ = r16.landmarks.every(l => l.x===0 && l.y===0 && l.z===0);
    const anyNaN = r16.landmarks.some(l => isNaN(l.x));
    L('DEF score=' + r16.score.toFixed(4) + ' hand=' + r16.handedness);
    L('DEF lm0: ' + r16.landmarks[0].x.toFixed(3) + ',' + r16.landmarks[0].y.toFixed(3));
    L('DEF lm10: ' + r16.landmarks[10].x.toFixed(3) + ',' + r16.landmarks[10].y.toFixed(3));
    if (anyNaN) L('DEF: NaN!', 'fail');
    else if (allZ) L('DEF: ALL ZERO', 'fail');
    else L('DEF: WORKS!', 'ok');
  }
  // Bench f16
  for (let i = 0; i < 3; i++) await hp16.detect(canvas);
  const t16 = [];
  for (let i = 0; i < 10; i++) {
    const t = performance.now();
    await hp16.detect(canvas);
    t16.push(performance.now() - t);
  }
  t16.sort((a,b) => a-b);
  L('DEF median=' + t16[5].toFixed(1) + 'ms min=' + t16[0].toFixed(1) + 'ms');
  hp16.dispose();

  // TEST 2: F32 path
  L('--- F32 TEST ---', 'warn');
  const hp32 = await createHandpose({ weightsUrl: './weights/', scoreThreshold: 0, forceF32: true });
  const r32 = await hp32.detect(canvas);
  if (!r32) {
    L('F32: NULL RESULT', 'fail');
  } else {
    const allZ = r32.landmarks.every(l => l.x===0 && l.y===0 && l.z===0);
    const anyNaN = r32.landmarks.some(l => isNaN(l.x));
    L('F32 score=' + r32.score.toFixed(4) + ' hand=' + r32.handedness);
    L('F32 lm0: ' + r32.landmarks[0].x.toFixed(3) + ',' + r32.landmarks[0].y.toFixed(3));
    L('F32 lm10: ' + r32.landmarks[10].x.toFixed(3) + ',' + r32.landmarks[10].y.toFixed(3));
    if (anyNaN) L('F32: NaN!', 'fail');
    else if (allZ) L('F32: ALL ZERO', 'fail');
    else L('F32: WORKS!', 'ok');
  }
  // Bench f32
  for (let i = 0; i < 3; i++) await hp32.detect(canvas);
  const t32 = [];
  for (let i = 0; i < 10; i++) {
    const t = performance.now();
    await hp32.detect(canvas);
    t32.push(performance.now() - t);
  }
  t32.sort((a,b) => a-b);
  L('F32 median=' + t32[5].toFixed(1) + 'ms min=' + t32[0].toFixed(1) + 'ms');

  // TEST 3: Layer debug (f32 path)
  L('--- LAYERS ---', 'warn');
  try {
    const layers = await hp32.debugLayerOutputs(canvas);
    for (const lr of layers) {
      const s = lr.stats;
      const ok = s.nonZero > 0;
      const name = lr.layer.length > 25 ? lr.layer.substring(0, 25) : lr.layer;
      L((ok ? 'OK' : 'ZERO') + ' ' + name + ' nz=' + s.nonZero + '/' + s.total, ok ? 'ok' : 'fail');
    }
  } catch(e) {
    L('ERR: ' + e.message, 'fail');
  }
  hp32.dispose();

  // SUMMARY at bottom (visible in screenshots)
  L('');
  L('========== SUMMARY ==========', 'warn');
  const defOK = r16 && !r16.landmarks.every(l => l.x===0 && l.y===0 && l.z===0);
  const f32OK = r32 && !r32.landmarks.every(l => l.x===0 && l.y===0 && l.z===0);
  L('DEFAULT: ' + (defOK ? 'WORKS!' : 'BROKEN'), defOK ? 'ok' : 'fail');
  L('F32:     ' + (f32OK ? 'WORKS!' : 'BROKEN'), f32OK ? 'ok' : 'fail');
  if (defOK) L('DEF time: ' + t16[5].toFixed(1) + 'ms');
  if (f32OK) L('F32 time: ' + t32[5].toFixed(1) + 'ms');
  L('iOS: ' + (/iPhone|iPad/.test(navigator.userAgent) ? 'YES' : 'NO'));
  L('=== DONE ===', 'ok');
} catch (e) {
  L('FATAL: ' + e.message, 'fail');
  L(e.stack || '');
}
</script></body></html>
