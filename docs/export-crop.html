<!DOCTYPE html>
<html>
<head>
  <title>Export GPU Crop Tensor</title>
  <style>body { font-family: monospace; background: #111; color: #eee; padding: 20px; } pre { background: #222; padding: 10px; border-radius: 6px; font-size: 11px; } #scores, #landmarks { display: none; }</style>
</head>
<body>
  <h1>Export GPU Crop + Landmark Outputs</h1>
  <p>Exports the exact crop tensor and landmark outputs for TFLite CPU comparison.</p>
  <div id="status">Initializing...</div>
  <pre id="output"></pre>
  <div id="landmarks"></div>

  <script type="module">
    const status = document.getElementById('status');
    const output = document.getElementById('output');

    async function run() {
      try {
        status.textContent = 'Loading micro-handpose...';
        const { createHandpose } = await import('./dist/index.js?v=export3');
        const handpose = await createHandpose({
          weightsUrl: 'weights',
          scoreThreshold: 0.1,
          palmScoreThreshold: 0.5,
        });

        // Load test image
        status.textContent = 'Loading test image...';
        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = 'test-hands/hand_05.jpg';
        });

        status.textContent = 'Running full pipeline with debug...';
        const results = await handpose.detectWithDebug(img);

        if (results.length === 0) {
          status.textContent = 'No hands detected!';
          return;
        }

        const hand = results[0];
        let text = `Detected ${results.length} hand(s)\n`;
        text += `\nPalm detection:\n`;
        text += `  score: ${hand.palmDetection.score.toFixed(6)}\n`;
        text += `  box: [${hand.palmDetection.box.map(v=>v.toFixed(6)).join(', ')}]\n`;
        text += `  wrist: (${hand.palmDetection.keypoints[0][0].toFixed(6)}, ${hand.palmDetection.keypoints[0][1].toFixed(6)})\n`;
        text += `  middleMCP: (${hand.palmDetection.keypoints[2][0].toFixed(6)}, ${hand.palmDetection.keypoints[2][1].toFixed(6)})\n`;

        text += `\nROI:\n`;
        text += `  center: (${hand.roi.centerXpx.toFixed(4)}, ${hand.roi.centerYpx.toFixed(4)})\n`;
        text += `  size: ${hand.roi.sizePx.toFixed(4)}px\n`;
        text += `  rotation: ${hand.roi.rotation.toFixed(6)} (${(hand.roi.rotation * 180 / Math.PI).toFixed(2)}°)\n`;

        text += `\nHand score: ${hand.score.toFixed(6)}\n`;
        text += `Handedness: ${hand.handedness}\n`;

        text += `\nLandmarks (21 points, normalized):\n`;
        for (let i = 0; i < 21; i++) {
          const lm = hand.landmarks[i];
          text += `  [${i.toString().padStart(2)}]: (${lm.x.toFixed(6)}, ${lm.y.toFixed(6)}, ${lm.z.toFixed(6)})\n`;
        }

        output.textContent = text;

        // Store landmarks as JSON for comparison
        const lmData = {
          palmDetection: hand.palmDetection,
          roi: hand.roi,
          landmarks: hand.landmarks.map(l => ({ x: l.x, y: l.y, z: l.z })),
          score: hand.score,
          handedness: hand.handedness,
        };
        document.getElementById('landmarks').textContent = JSON.stringify(lmData);

        // Now export the crop tensor
        // We need to get the raw crop buffer from the landmark model
        // The debugDetect path already runs the crop + landmark model
        // Let's also get the raw crop tensor by running the crop shader and reading back

        status.textContent = 'Exporting crop tensor...';

        // Get the debug model to export crop
        const palmModel = handpose._debug.palmModel;
        const landmarkModel = handpose._debug.landmarkModel;

        // The crop tensor is [3, 224, 224] CHW in our GPU pipeline
        // Let's use debugLayerOutputs to get the input layer
        if (landmarkModel.debugLayerOutputs) {
          text += `\nLandmark model debug available!\n`;
          // Run with the crop from this detection
          // We need to crop the image using the same ROI
          // Actually, detectWithDebug already ran the crop. We need to capture
          // the crop tensor during the pipeline.
          //
          // For now, let's export what we have: the palm detection and landmarks
          // The most important comparison is the final landmarks vs TFLite CPU
        }

        // Save palm detection for CPU comparison
        const exportData = {
          image: 'test-hands/hand_05.jpg',
          imageSize: [img.naturalWidth, img.naturalHeight],
          palmDetection: hand.palmDetection,
          roi: hand.roi,
          landmarks: hand.landmarks.map(l => ({ x: l.x, y: l.y, z: l.z })),
          score: hand.score,
          handedness: hand.handedness,
          // Also store raw SSD for comparison
          // rawPalmScores: Array.from(hand.rawPalmScores || []),
        };

        output.textContent = text;
        status.textContent = 'Done! Data in hidden div.';

      } catch (e) {
        status.textContent = `Error: ${e.message}`;
        console.error(e);
      }
    }

    run();
  </script>
</body>
</html>
