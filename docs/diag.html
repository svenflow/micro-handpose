<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>micro-handpose diagnostic</title>
<style>body{background:#111;color:#eee;font-family:monospace;padding:16px;font-size:13px;white-space:pre-wrap;word-break:break-all;}</style>
</head><body>
<div id="log">Starting diagnostic...\n</div>
<script type="module">
const log = document.getElementById('log');
function L(msg) { log.textContent += msg + '\n'; console.log(msg); }

try {
  L('1. Checking WebGPU...');
  if (!navigator.gpu) { L('ERROR: No WebGPU'); throw new Error('no webgpu'); }
  L('   OK');

  L('2. Requesting adapter...');
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) { L('ERROR: No adapter'); throw new Error('no adapter'); }
  L('   vendor: ' + (adapter.info?.vendor || 'unknown'));
  L('   arch: ' + (adapter.info?.architecture || 'unknown'));

  L('3. Checking shader-f16...');
  const hasF16 = adapter.features.has('shader-f16');
  L('   shader-f16: ' + hasF16);

  L('4. Requesting device...');
  const features = hasF16 ? ['shader-f16'] : [];
  const device = await adapter.requestDevice({ requiredFeatures: features });
  L('   OK');

  if (hasF16) {
    L('5. Testing f16 shader compilation...');
    try {
      const testModule = device.createShaderModule({
        code: 'enable f16;\n@compute @workgroup_size(1)\nfn main() { var x: f16 = f16(1.0); _ = x; }'
      });
      const info = await testModule.getCompilationInfo();
      const errors = info.messages.filter(m => m.type === 'error');
      L(errors.length > 0 ? '   ERRORS: ' + JSON.stringify(errors.map(e => e.message)) : '   f16 compilation OK!');
    } catch (e) {
      L('   f16 EXCEPTION: ' + e.message);
    }
  }
  device.destroy();

  L('6. Creating handpose model...');
  const { createHandpose } = await import('./dist/index.js');
  const hp = await createHandpose({ weightsUrl: './weights/' });
  L('   Model created OK!');

  L('7. Running inference...');
  const canvas = new OffscreenCanvas(256, 256);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#888';
  ctx.fillRect(0, 0, 256, 256);
  const result = await hp.detect(canvas);
  L('   result: ' + (result ? 'hand detected (score=' + result.score.toFixed(3) + ')' : 'null (no hand — expected for gray canvas)'));

  // Quick sanity check: 5 runs
  L('8. Quick benchmark (5 runs)...');
  const qtimes = [];
  for (let i = 0; i < 5; i++) {
    const t0 = performance.now();
    await hp.detect(canvas);
    qtimes.push((performance.now() - t0).toFixed(1));
  }
  L('   times: ' + qtimes.join(', ') + ' ms');

  // Detailed benchmark with more iterations to overcome Safari 1ms timer precision
  L('9. Detailed benchmark (100 runs, batched timing)...');

  // Warmup
  for (let i = 0; i < 10; i++) await hp.detect(canvas);

  // Measure total time for batches of 10 to get sub-ms precision
  const batchSizes = [1, 10, 50];
  for (const batchSize of batchSizes) {
    const batchTimes = [];
    const numBatches = Math.ceil(100 / batchSize);
    for (let b = 0; b < numBatches; b++) {
      const t0 = performance.now();
      for (let i = 0; i < batchSize; i++) {
        await hp.detect(canvas);
      }
      batchTimes.push(performance.now() - t0);
    }
    const totalMs = batchTimes.reduce((a, b) => a + b, 0);
    const totalRuns = numBatches * batchSize;
    const avgMs = totalMs / totalRuns;
    batchTimes.sort((a, b) => a - b);
    const medianBatch = batchTimes[Math.floor(batchTimes.length / 2)];
    L('   batch=' + batchSize + ': avg=' + avgMs.toFixed(2) + 'ms/run, median_batch=' + (medianBatch / batchSize).toFixed(2) + 'ms/run, total=' + totalMs.toFixed(0) + 'ms/' + totalRuns + 'runs');
  }

  // 10. Diagnostic benchmark (if available)
  L('10. Diagnostic benchmark (GPU vs readback breakdown)...');
  try {
    const diag = await hp.benchmarkDiagnostic(canvas);
    L('    GPU only:       median=' + diag.gpuOnly.median.toFixed(2) + 'ms, min=' + diag.gpuOnly.min.toFixed(2) + 'ms');
    L('    mapAsync:       median=' + diag.mapAsyncOnly.median.toFixed(2) + 'ms, min=' + diag.mapAsyncOnly.min.toFixed(2) + 'ms');
    L('    mapAsync(noWait): median=' + diag.mapAsyncNoWait.median.toFixed(2) + 'ms, min=' + diag.mapAsyncNoWait.min.toFixed(2) + 'ms');
    L('    Total (e2e):    median=' + diag.total.median.toFixed(2) + 'ms, min=' + diag.total.min.toFixed(2) + 'ms');
    L('    Pipelined:      median=' + diag.pipelined.median.toFixed(2) + 'ms, min=' + diag.pipelined.min.toFixed(2) + 'ms');
    if (diag.renderReadback) {
      L('    Render readback: median=' + diag.renderReadback.median.toFixed(2) + 'ms, min=' + diag.renderReadback.min.toFixed(2) + 'ms');
    }
  } catch (e) {
    L('    benchmarkDiagnostic error: ' + e.message);
  }

  L('\n=== ALL OK ===');
  L('Timer precision: ' + performance.now().toString().split('.')[1]?.length + ' decimal places');
} catch (e) {
  L('\nFATAL: ' + e.message);
  L('Stack: ' + (e.stack || 'no stack'));
}
</script></body></html>
