<!DOCTYPE html>
<html>
<head>
  <title>Pipeline Isolation: Crop-Space vs Image-Space Divergence</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; margin: 0; }
    h1 { color: #8af; margin-bottom: 5px; }
    .subtitle { color: #888; margin-bottom: 20px; font-size: 13px; }
    #status { color: #888; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
    td, th { border: 1px solid #333; padding: 5px 8px; }
    th { background: #222; color: #aaa; font-weight: normal; }
    .good { color: #3f8; }
    .mid { color: #fe8; }
    .bad { color: #f84; }
    .section { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .section h2 { color: #8af; margin: 0 0 12px 0; font-size: 14px; }
    .metric { display: inline-block; background: #222; padding: 8px 14px; border-radius: 8px; margin: 4px; text-align: center; }
    .metric .label { font-size: 10px; color: #888; }
    .metric .value { font-size: 22px; font-weight: bold; }
    .canvases { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
    .canvases > div { text-align: center; }
    .canvases canvas { border: 1px solid #333; border-radius: 4px; }
    .canvases .label { font-size: 10px; color: #888; margin-bottom: 4px; }
    pre { background: #222; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 11px; }
  </style>
</head>
<body>
  <h1>🔬 Pipeline Isolation Diagnostic</h1>
  <p class="subtitle">Separates crop-space model error from image-space pipeline error to identify divergence source.</p>
  <div id="status">Initializing...</div>
  <div id="results"></div>

  <script type="module">
    const TEST_IMAGES = [
      { file: 'test-hands/hand_05.jpg', label: 'Hand Square' },
      { file: 'test-hands/hand_06.jpg', label: 'Hand Reaching 2' },
      { file: 'test-hands/hand_07.jpg', label: 'Pointing Finger' },
      { file: 'test-hands/hand_08.jpg', label: 'Hand Gesture' },
      { file: 'test-hands/hand_09.jpg', label: 'Nikhil' },
      { file: 'test-hands/hand_10.jpg', label: 'Test Hand' },
    ];

    const NAMES = [
      'wrist', 'thumb_cmc', 'thumb_mcp', 'thumb_ip', 'thumb_tip',
      'index_mcp', 'index_pip', 'index_dip', 'index_tip',
      'middle_mcp', 'middle_pip', 'middle_dip', 'middle_tip',
      'ring_mcp', 'ring_pip', 'ring_dip', 'ring_tip',
      'pinky_mcp', 'pinky_pip', 'pinky_dip', 'pinky_tip',
    ];

    const status = document.getElementById('status');
    const resultsDiv = document.getElementById('results');

    function cls(pct) { return pct < 0.3 ? 'good' : pct < 1.0 ? 'mid' : 'bad'; }

    async function loadImage(src) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      return new Promise((resolve, reject) => {
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`Failed: ${src}`));
        img.src = src;
      });
    }

    async function run() {
      try {
        status.textContent = 'Loading micro-handpose...';
        const { createHandpose } = await import('./dist/index.js?v=rebuild9');
        const handpose = await createHandpose({
          weightsUrl: 'weights',
          scoreThreshold: 0.1,
          palmScoreThreshold: 0.5,
        });

        status.textContent = 'Loading MediaPipe...';
        const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs');
        const { HandLandmarker, FilesetResolver } = vision;
        const wasmFileset = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
        );
        const mpGpu = await HandLandmarker.createFromOptions(wasmFileset, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',
            delegate: 'GPU',
          },
          runningMode: 'IMAGE',
          numHands: 4,
        });

        status.textContent = 'Running diagnostics...';

        // Aggregate stats across all images
        const allCropErrors = [];
        const allImageErrors = [];
        const allMeanShifts = [];

        for (let imgIdx = 0; imgIdx < TEST_IMAGES.length; imgIdx++) {
          const { file, label } = TEST_IMAGES[imgIdx];
          status.textContent = `Processing ${imgIdx + 1}/${TEST_IMAGES.length}: ${label}...`;

          const img = await loadImage(file);
          const srcW = img.naturalWidth, srcH = img.naturalHeight;

          // Run with debug info
          const microDebug = await handpose.detectWithDebug(img);
          const mpResults = mpGpu.detect(img);
          const mpLandmarks = mpResults.landmarks || [];

          if (microDebug.length === 0 || mpLandmarks.length === 0) {
            resultsDiv.innerHTML += `<div class="section"><h2>${imgIdx + 1}. ${label} — skipped (micro: ${microDebug.length}, MP: ${mpLandmarks.length})</h2></div>`;
            continue;
          }

          // Match hands by wrist distance
          const micro = microDebug[0];
          let bestMpIdx = 0, bestDist = Infinity;
          for (let j = 0; j < mpLandmarks.length; j++) {
            const d = Math.sqrt(
              (micro.landmarks[0].x - mpLandmarks[j][0].x) ** 2 +
              (micro.landmarks[0].y - mpLandmarks[j][0].y) ** 2
            );
            if (d < bestDist) { bestDist = d; bestMpIdx = j; }
          }
          const mpLm = mpLandmarks[bestMpIdx];

          // === ANALYSIS 1: Image-space error (standard) ===
          const imageErrors = [];
          for (let i = 0; i < 21; i++) {
            const d = Math.sqrt(
              (micro.landmarks[i].x - mpLm[i].x) ** 2 +
              (micro.landmarks[i].y - mpLm[i].y) ** 2
            );
            imageErrors.push(d);
          }
          const avgImageErr = imageErrors.reduce((s, v) => s + v, 0) / 21;
          const maxImageErr = Math.max(...imageErrors);
          const maxImageIdx = imageErrors.indexOf(maxImageErr);

          // === ANALYSIS 2: Reverse-project MP landmarks to our crop space ===
          // Using our ROI, compute what MP landmarks would be in our crop space
          const roi = micro.roi;
          const cosR = Math.cos(roi.rotation);
          const sinR = Math.sin(roi.rotation);

          const mpCropLandmarks = [];
          for (let i = 0; i < 21; i++) {
            // Image [0,1] → pixel
            const px = mpLm[i].x * srcW;
            const py = mpLm[i].y * srcH;
            // Translate to ROI center
            const dx = px - roi.centerXpx;
            const dy = py - roi.centerYpx;
            // Inverse rotate: R(-rotation)
            const cropDx = cosR * dx + sinR * dy;
            const cropDy = -sinR * dx + cosR * dy;
            // Scale to crop [0,1]
            const cx = cropDx / roi.sizePx + 0.5;
            const cy = cropDy / roi.sizePx + 0.5;
            mpCropLandmarks.push({ x: cx, y: cy, z: mpLm[i].z ?? 0 });
          }

          // Crop-space error: our raw crop landmarks vs MP reverse-projected crop landmarks
          const cropErrors = [];
          const cropShiftsX = [], cropShiftsY = [];
          for (let i = 0; i < 21; i++) {
            const d = Math.sqrt(
              (micro.cropLandmarks[i].x - mpCropLandmarks[i].x) ** 2 +
              (micro.cropLandmarks[i].y - mpCropLandmarks[i].y) ** 2
            );
            cropErrors.push(d);
            cropShiftsX.push(micro.cropLandmarks[i].x - mpCropLandmarks[i].x);
            cropShiftsY.push(micro.cropLandmarks[i].y - mpCropLandmarks[i].y);
          }
          const avgCropErr = cropErrors.reduce((s, v) => s + v, 0) / 21;
          const maxCropErr = Math.max(...cropErrors);
          const maxCropIdx = cropErrors.indexOf(maxCropErr);

          // Mean shift in crop space (systematic offset = crop ROI difference)
          const meanShiftX = cropShiftsX.reduce((s, v) => s + v, 0) / 21;
          const meanShiftY = cropShiftsY.reduce((s, v) => s + v, 0) / 21;
          const meanShiftMag = Math.sqrt(meanShiftX ** 2 + meanShiftY ** 2);

          // Residual crop error after removing mean shift (= pure model disagreement)
          const residualErrors = [];
          for (let i = 0; i < 21; i++) {
            const d = Math.sqrt(
              (cropShiftsX[i] - meanShiftX) ** 2 +
              (cropShiftsY[i] - meanShiftY) ** 2
            );
            residualErrors.push(d);
          }
          const avgResidualErr = residualErrors.reduce((s, v) => s + v, 0) / 21;

          allCropErrors.push(avgCropErr);
          allImageErrors.push(avgImageErr);
          allMeanShifts.push(meanShiftMag);

          // Build HTML
          let html = `<div class="section">
            <h2>${imgIdx + 1}. ${label} (${srcW}×${srcH})</h2>
            <div>
              <div class="metric"><div class="label">Image-space error</div><div class="value ${cls(avgImageErr * 100)}">${(avgImageErr * 100).toFixed(3)}%</div></div>
              <div class="metric"><div class="label">Crop-space error</div><div class="value ${cls(avgCropErr * 100)}">${(avgCropErr * 100).toFixed(3)}%</div></div>
              <div class="metric"><div class="label">Mean crop shift</div><div class="value ${cls(meanShiftMag * 100)}">${(meanShiftMag * 100).toFixed(3)}%</div></div>
              <div class="metric"><div class="label">Residual (model-only)</div><div class="value ${cls(avgResidualErr * 100)}">${(avgResidualErr * 100).toFixed(3)}%</div></div>
            </div>
            <pre>ROI: center=(${roi.centerXpx.toFixed(1)}, ${roi.centerYpx.toFixed(1)})  size=${roi.sizePx.toFixed(1)}px  rot=${(roi.rotation * 180 / Math.PI).toFixed(1)}°
Palm det: score=${micro.palmDetection.score.toFixed(3)}  box=[${micro.palmDetection.box.map(v=>v.toFixed(4)).join(', ')}]
Mean shift: (${(meanShiftX*100).toFixed(3)}%, ${(meanShiftY*100).toFixed(3)}%) = ${(meanShiftMag*100).toFixed(3)}% systematic offset
Interpretation: ${meanShiftMag > avgCropErr * 0.5 ? '⚠️ DOMINATED BY CROP ROI OFFSET' : '✅ Mostly model divergence'}</pre>
            <table>
              <tr><th>#</th><th>Landmark</th><th>Image err</th><th>Crop err</th><th>Residual</th><th>Our crop (x,y)</th><th>MP→crop (x,y)</th><th>Shift (x,y)</th></tr>`;

          for (let i = 0; i < 21; i++) {
            html += `<tr>
              <td>${i}</td><td>${NAMES[i]}</td>
              <td class="${cls(imageErrors[i]*100)}">${(imageErrors[i]*100).toFixed(3)}%</td>
              <td class="${cls(cropErrors[i]*100)}">${(cropErrors[i]*100).toFixed(3)}%</td>
              <td class="${cls(residualErrors[i]*100)}">${(residualErrors[i]*100).toFixed(3)}%</td>
              <td>(${micro.cropLandmarks[i].x.toFixed(4)}, ${micro.cropLandmarks[i].y.toFixed(4)})</td>
              <td>(${mpCropLandmarks[i].x.toFixed(4)}, ${mpCropLandmarks[i].y.toFixed(4)})</td>
              <td class="${cls(Math.sqrt(cropShiftsX[i]**2+cropShiftsY[i]**2)*100)}">(${(cropShiftsX[i]*100).toFixed(3)}%, ${(cropShiftsY[i]*100).toFixed(3)}%)</td>
            </tr>`;
          }

          html += `<tr style="font-weight:bold; background:#1a1a2e;">
            <td></td><td>AVERAGE</td>
            <td class="${cls(avgImageErr*100)}">${(avgImageErr*100).toFixed(3)}%</td>
            <td class="${cls(avgCropErr*100)}">${(avgCropErr*100).toFixed(3)}%</td>
            <td class="${cls(avgResidualErr*100)}">${(avgResidualErr*100).toFixed(3)}%</td>
            <td></td><td></td><td></td>
          </tr></table></div>`;

          resultsDiv.innerHTML += html;
        }

        // Summary
        if (allCropErrors.length > 0) {
          const overallImage = allImageErrors.reduce((s,v) => s+v, 0) / allImageErrors.length;
          const overallCrop = allCropErrors.reduce((s,v) => s+v, 0) / allCropErrors.length;
          const overallShift = allMeanShifts.reduce((s,v) => s+v, 0) / allMeanShifts.length;

          const summaryHtml = `<div class="section" style="border-color: #8af;">
            <h2>📊 Overall Summary (${allCropErrors.length} images)</h2>
            <div>
              <div class="metric"><div class="label">Avg image-space err</div><div class="value ${cls(overallImage*100)}">${(overallImage*100).toFixed(3)}%</div></div>
              <div class="metric"><div class="label">Avg crop-space err</div><div class="value ${cls(overallCrop*100)}">${(overallCrop*100).toFixed(3)}%</div></div>
              <div class="metric"><div class="label">Avg systematic shift</div><div class="value ${cls(overallShift*100)}">${(overallShift*100).toFixed(3)}%</div></div>
            </div>
            <pre>
🔍 DIAGNOSIS:
  Image-space error:  ${(overallImage*100).toFixed(3)}% (what users see)
  Crop-space error:   ${(overallCrop*100).toFixed(3)}% (model + crop offset combined)
  Systematic shift:   ${(overallShift*100).toFixed(3)}% (pure crop ROI difference)

  If crop-space error ≈ systematic shift → different crop ROIs, models agree
  If crop-space error >> systematic shift → models genuinely disagree
  If image error >> crop error → back-projection amplifies crop offset

  Crop ROI offset explains ${(overallShift / overallCrop * 100).toFixed(0)}% of crop-space error
  Model disagreement explains ${((1 - overallShift / overallCrop) * 100).toFixed(0)}% of crop-space error
            </pre>
          </div>`;
          resultsDiv.innerHTML = summaryHtml + resultsDiv.innerHTML;
        }

        status.textContent = 'Done!';
        console.log('=== DIAGNOSTIC RESULTS ===');
        console.log('Image errors:', allImageErrors.map(v => (v*100).toFixed(3) + '%'));
        console.log('Crop errors:', allCropErrors.map(v => (v*100).toFixed(3) + '%'));
        console.log('Mean shifts:', allMeanShifts.map(v => (v*100).toFixed(3) + '%'));

      } catch (e) {
        status.textContent = `❌ Error: ${e.message}`;
        console.error(e);
      }
    }

    run();
  </script>
</body>
</html>
