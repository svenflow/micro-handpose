<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>micro-handpose auto-test</title>
  <style>
    body { background: #0a0a0a; color: #ededed; font-family: system-ui; padding: 20px; }
    #log { white-space: pre-wrap; font-family: monospace; font-size: 14px; line-height: 1.6; }
    canvas { max-width: 100%; border: 1px solid #333; margin: 10px 0; }
    .ok { color: #34d399; }
    .err { color: #ef4444; }
    .info { color: #7c6aef; }
  </style>
</head>
<body>
  <h2>micro-handpose iOS Auto-Test</h2>
  <div id="log"></div>
  <canvas id="canvas"></canvas>

  <script type="module">
    const log = document.getElementById('log');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function write(msg, cls = '') {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = msg + '\n';
      log.appendChild(span);
      window.scrollTo(0, document.body.scrollHeight);
    }

    async function run() {
      write('micro-handpose iOS auto-test', 'info');
      write('UA: ' + navigator.userAgent);
      write('');

      // 1. Check WebGPU
      write('1. Checking WebGPU...');
      if (!navigator.gpu) {
        write('FAIL: WebGPU NOT available', 'err');
        return;
      }
      write('OK: navigator.gpu exists', 'ok');

      // 2. Request adapter
      write('2. Requesting GPU adapter...');
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) {
        write('FAIL: No GPU adapter', 'err');
        return;
      }
      write('OK: GPU adapter acquired', 'ok');

      // 3. Request device
      write('3. Requesting GPU device...');
      const device = await adapter.requestDevice();
      write('OK: GPU device created', 'ok');

      // 4. Load test image
      write('4. Loading test image...');
      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = 'test-hand-ref.png';
      });
      write('OK: Image loaded: ' + img.naturalWidth + 'x' + img.naturalHeight, 'ok');

      // Draw on canvas
      const scale = Math.min(300 / img.naturalWidth, 400 / img.naturalHeight);
      canvas.width = Math.round(img.naturalWidth * scale);
      canvas.height = Math.round(img.naturalHeight * scale);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // 5. Import and run micro-handpose
      write('5. Loading micro-handpose from npm...');
      try {
        const { createHandTracker } = await import('https://esm.sh/@svenflow/micro-handpose@0.3.0');
        write('OK: Module loaded', 'ok');

        write('6. Creating hand tracker (compiling shaders)...');
        const t0 = performance.now();
        const tracker = await createHandTracker(device);
        const initMs = (performance.now() - t0).toFixed(0);
        write('OK: Tracker created in ' + initMs + 'ms', 'ok');

        write('7. Running inference on test image...');
        const bmp = await createImageBitmap(img);
        const t1 = performance.now();
        const results = await tracker.detect(bmp);
        const inferMs = (performance.now() - t1).toFixed(0);
        write('OK: Inference done in ' + inferMs + 'ms', 'ok');

        write('');
        write('Results:', 'info');
        write('  Hands detected: ' + results.length);
        if (results.length > 0) {
          const hand = results[0];
          write('  Score: ' + (hand.score !== undefined ? hand.score.toFixed(3) : 'N/A'));
          write('  Landmarks: ' + (hand.landmarks ? hand.landmarks.length : 'N/A'));
          if (hand.landmarks && hand.landmarks.length > 0) {
            write('  First landmark: [' + hand.landmarks[0].map(v => v.toFixed(3)).join(', ') + ']');
          }
        }

        write('');
        write('ALL TESTS PASSED - WebGPU hand tracking works on iOS Safari!', 'ok');

      } catch (e) {
        write('ERROR: ' + e.message, 'err');
        if (e.stack) write(e.stack, 'err');
      }
    }

    run().catch(e => write('FATAL: ' + e.message, 'err'));
  </script>
</body>
</html>
